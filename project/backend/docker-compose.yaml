services:
  database:
      image: postgres:16
      restart: always
      env_file:
        - .env
      #expose:
      #  - "5432"
      ports:
        - "5432:5432"
      environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
        POSTGRES_DB: weblabs
      volumes:
        - ./pgdata:/var/lib/postgresql/data
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U postgres -d weblabs"]
        interval: 5s
        timeout: 5s
        retries: 5

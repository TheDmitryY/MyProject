<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тестування: Хто літає? (Варіант 9)</title>
    <link rel="stylesheet" href="task3.css">
</head>
<body>
    <div class="test-container">
        <h1>Запитання: Хто літає?</h1>
        
        <div class="options-table">
            <div class="header">
                <div class="col">Перемикачі</div>
                <div class="col">Варіанти</div>
            </div>
            <div class="row">
                <div class="col"><input type="radio" name="flyer" id="opt1" value="incorrect"></div>
                <div class="col"><label for="opt1">Кіт</label></div>
            </div>
            <div class="row">
                <div class="col"><input type="radio" name="flyer" id="opt2" value="correct"></div>
                <div class="col"><label for="opt2">Горобець</label></div>
            </div>
            <div class="row">
                <div class="col"><input type="radio" name="flyer" id="opt3" value="incorrect"></div>
                <div class="col"><label for="opt3">Риба</label></div>
            </div>
        </div>

        <button id="check-btn">Перевірка рішення</button>
        <div id="result"></div>
    </div>
    <script src="task3.js"></script>
</body>
</html>

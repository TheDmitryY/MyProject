<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Завдання 5: Обчислення суми</title>
    <link rel="stylesheet" href="task5.css">
</head>
<body>
    <div class="calculator">
        <h2>Додавання двох чисел</h2>
        <form id="sumForm">
            <div class="input-group">
                <label for="num1">Число 1:</label>
                <input type="number" id="num1" step="any" required>
            </div>
            <div class="input-group">
                <label for="num2">Число 2:</label>
                <input type="number" id="num2" step="any" required>
            </div>
            <div class="input-group">
                <label for="resultField">Результат:</label>
                <input type="text" id="resultField" readonly>
            </div>
            <button type="button" id="calcBtn">Обчислити суму</button>
        </form>
    </div>
    <script src="task5.js"></script>
</body>
</html>
